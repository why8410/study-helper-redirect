<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Helper for SA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
      background: #f5f5f7;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 22px;
      padding: 48px 40px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; margin-bottom: 8px; }
    p { color: #6e6e73; font-size: 0.95rem; line-height: 1.6; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e8e8ed;
      border-top-color: #2CA3E1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .retry {
      margin-top: 20px;
      padding: 12px 24px;
      background: #2CA3E1;
      color: #fff;
      border: 0;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">📚</div>
  <h1>Study Helper for SA</h1>
  <div class="spinner" id="spinner"></div>
  <p id="msg">서버에 연결 중...</p>
  <button class="retry hidden" id="retry" onclick="load()">다시 시도</button>
</div>
<script>
function load() {
  document.getElementById('spinner').classList.remove('hidden');
  document.getElementById('retry').classList.add('hidden');
  document.getElementById('msg').textContent = '서버에 연결 중...';

  fetch('https://api.github.com/repos/why8410/study-helper-redirect/contents/url.txt', {
    headers: { 'Accept': 'application/vnd.github.v3+json' },
    cache: 'no-store'
  })
  .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
  .then(d => {
    const url = atob(d.content.replace(/\n/g, ''));
    document.getElementById('msg').textContent = '이동 중...';
    window.location.replace(url);
  })
  .catch(() => {
    document.getElementById('spinner').classList.add('hidden');
    document.getElementById('retry').classList.remove('hidden');
    document.getElementById('msg').textContent = 'Mac이 꺼져 있거나 앱이 실행되지 않았어요.\nStudy Helper 앱을 실행한 뒤 다시 시도해 주세요.';
  });
}
load();
</script>
</body>
</html>
